id: ndvi
requirements:
  # - name: ecoscope-workflows-core
  #   version: 0.22.2
  #   channel: https://repo.prefix.dev/ecoscope-workflows/
  # - name: ecoscope-workflows-ext-ecoscope
  #   version: 0.22.2
  #   channel: https://repo.prefix.dev/ecoscope-workflows/
  # - name: ecoscope-workflows-ext-custom
  #   version: 0.0.28
  #   channel: https://repo.prefix.dev/ecoscope-workflows-custom/
  - name: ecoscope-workflows-core
    version: "*"
    channel: file:///tmp/ecoscope-workflows/release/artifacts/
  - name: ecoscope-workflows-ext-ecoscope
    version: "*"
    channel: file:///tmp/ecoscope-workflows/release/artifacts/
  - name: ecoscope-workflows-ext-custom
    version: "*"
    channel: file:///tmp/ecoscope-workflows-custom/release/artifacts/
  - name: pydeck
    version: "*"
    channel: https://repo.prefix.dev/ecoscope-workflows-custom/
rjsf-overrides:
  $defs:
    ValueGrouper.properties.index_name.oneOf: [
      {"const": "name", "title": "Region of Interest"},
    ]
    LocalFileSpatialFeatures.properties.file_path.default: ""
    LocalFileSpatialFeatures.properties.layer.type: ["string", "null"]
    RemoteFileSpatialFeatures.properties.url.default: ""
    RemoteFileSpatialFeatures.properties.layer.type: ["string", "null"]
  properties:
    groupers.properties.groupers.items.anyOf: [
      {"$ref": "#/$defs/ValueGrouper"},
    ]
    groupers.properties.groupers.default: [
      {"index_name": "name"},
    ]
    time_range.description: "Choose the period of time to analyze. Please make sure you select a large enough time range to see results. We recommend at least 2 months, as the latest month's data may not be ready yet."
    roi.properties.config.anyOf: [
      {"$ref": "#/$defs/LocalFileSpatialFeatures"},
      {"$ref": "#/$defs/RemoteFileSpatialFeatures"},
    ]
    roi.properties.config.default: {"file_path": "", "name_column": ""}
    ndvi_method.properties.var.title: " "
    ndvi_method.properties.var.description: "Method to obtain NDVI values. 'MODIS MYD13A1 16-Day Composite': Uses pre-calculated NDVI from 16-day composites. Provides quality-filtered 'best pixel' values at 500m resolution with ~0.025 accuracy. Better for phenology studies but may saturate in dense canopies. 'MODIS MCD43A4 Daily NBAR': Uses daily nadir BRDF-adjusted reflectance. Computes NDVI from NIR/Red bands with view-angle correction for consistent measurements. Higher temporal resolution but more susceptible to cloud gaps."
    ndvi_method.properties.var.enum: [
      "MODIS MYD13A1 16-Day Composite",
      "MODIS MCD43A4 Daily NBAR",
    ]
    ndvi_method.properties.var.default: "MODIS MYD13A1 16-Day Composite"
    ndvi_method.required: []
    persist_ndvi_data.properties.filetypes.default: ["geoparquet"]
    NDVI Map.properties.ndvi_tile.properties.opacity.default: 0.7
    calculate_ndvi.title: "NDVI Trend"
    NDVI Map.properties.base_maps.properties.base_maps.title: "Map Base Layers"
    NDVI Map.properties.base_maps.properties.base_maps.default: [
      {"url": "https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}", "opacity": 1, "max_zoom": 20},
    ]
  uiSchema:
    NDVI Map.base_maps.base_maps.items.ui:options.label: false

workflow:
  - name: Set Workflow Details
    id: workflow_details
    task: set_workflow_details
  - name: Select Google Earth Engine Data Source
    id: gee_client
    task: set_gee_connection
  - name: Time Range
    id: time_range
    task: set_time_range
    partial:
      time_format: "%d %b %Y %H:%M:%S %Z"
  - name: Set Groupers
    id: groupers
    task: set_groupers
  - name: Load Region of Interest
    id: roi
    task: load_spatial_features_group
  - name: Split ROIs by Group
    id: split_roi_groups
    task: split_groups
    partial:
      df: ${{ workflow.roi.return }}
      groupers: ${{ workflow.groupers.return }}
  - name: NDVI Method
    id: ndvi_method
    task: set_string_var
  - name: NDVI Trend
    id: calculate_ndvi
    task: calculate_ndvi_range
    partial:
      client: ${{ workflow.gee_client.return }}
      time_range: ${{ workflow.time_range.return }}
      ndvi_method: ${{ workflow.ndvi_method.return }}
      baseline_time_range: null # todo: add baseline time range when supported by web
      image_size: 1000000000 # todo: use baseline time range when supported by web
    mapvalues:
      argnames: roi
      argvalues: ${{ workflow.split_roi_groups.return}}
  - name: Persist NDVI Data
    id: persist_ndvi_data
    task: persist_df_wrapper
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
      sanitize: true
      filename_prefix: ndvi
    mapvalues:
      argnames: df
      argvalues: ${{ workflow.calculate_ndvi.return }}
  - name: Draw NDVI
    id: draw_ndvi
    task: draw_historic_timeseries
    partial:
      current_value_column: "NDVI"
      current_value_title: "NDVI"
      historic_min_column: "min"
      historic_max_column: "max"
      historic_mean_column: "mean"
      historic_band_title: "Historic Min-Max"
      historic_mean_title: "Historic Mean"
      layout_style: null
      upper_lower_band_style:
        mode: lines
        line:
          color: "rgba(144, 238, 144, 0.8)"
        fillcolor: "rgba(144, 238, 144, 0.3)"
      historic_mean_style: null
      current_value_style: null
      time_column: img_date
    mapvalues:
      argnames: dataframe
      argvalues: ${{ workflow.calculate_ndvi.return}}
  - name: Persist NDVI Chart as Text
    id: persist_ndvi
    task: persist_text
    partial:
      root_path:  ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
    mapvalues:
      argnames: text
      argvalues: ${{ workflow.draw_ndvi.return }}
  - name: Create NDVI Widget
    id: ndvi_chart_widget
    task: create_plot_widget_single_view
    partial:
      title: "NDVI Trends"
    map:
      argnames: [view, data]
      argvalues: ${{ workflow.persist_ndvi.return }}
  - name: Merge NDVI Widget Views
    id: grouped_ndvi_widget
    task: merge_widget_views
    partial:
      widgets: ${{ workflow.ndvi_chart_widget.return }}
  - title: NDVI Map
    type: task-group
    description: >-
      Configure the NDVI map base layers and overlay settings.
    tasks:
      - name: ""
        id: ndvi_tile
        task: create_ndvi_tile
        partial:
          client: ${{ workflow.gee_client.return }}
          time_range: ${{ workflow.time_range.return }}
          ndvi_method: ${{ workflow.ndvi_method.return }}
          reducer: mean
          palette: null
          scale: 500
          root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
          filename_prefix: ndvi_geotiff
        mapvalues:
          argnames: roi
          argvalues: ${{ workflow.split_roi_groups.return }}
      - name: ""
        id: base_maps
        task: set_base_maps_pydeck
  - name: Create ROI Boundary Layer
    id: roi_boundary_layer
    task: create_polygon_layer_pydeck
    partial:
      layer_style:
        get_line_color: [0, 128, 0, 255]
        get_line_width: 2
        opacity: 1.0
        stroked: true
        filled: false
        line_width_units: pixels
      legend: null
    mapvalues:
      argnames: geodataframe
      argvalues: ${{ workflow.split_roi_groups.return }}
  - name: Merge Tile Layers
    id: merged_tile_layers
    task: merge_tile_layers
    partial:
      base_layers: ${{ workflow.base_maps.return }}
    mapvalues:
      argnames: overlay
      argvalues: ${{ workflow.ndvi_tile.return }}
  - name: Combine Map Layers
    id: ndvi_map_layers
    task: groupbykey
    partial:
      iterables:
        - ${{ workflow.roi_boundary_layer.return }}
        - ${{ workflow.merged_tile_layers.return }}
  - name: Draw NDVI Map
    id: ndvi_map
    task: draw_map
    partial:
      static: false
      title: null
      legend_style: null
      max_zoom: 20
      view_state: null
    mapvalues:
      argnames: [geo_layers, tile_layers]
      argvalues: ${{ workflow.ndvi_map_layers.return }}
  - name: Persist NDVI Map
    id: persist_ndvi_map
    task: persist_text
    partial:
      root_path: ${{ env.ECOSCOPE_WORKFLOWS_RESULTS }}
    mapvalues:
      argnames: text
      argvalues: ${{ workflow.ndvi_map.return }}
  - name: Create NDVI Map Widget
    id: ndvi_map_widget
    task: create_map_widget_single_view
    partial:
      title: "NDVI Map"
    map:
      argnames: [view, data]
      argvalues: ${{ workflow.persist_ndvi_map.return }}
  - name: Merge NDVI Map Widget Views
    id: grouped_ndvi_map_widget
    task: merge_widget_views
    partial:
      widgets: ${{ workflow.ndvi_map_widget.return }}
  - name: Create a Dashboard
    id: ndvi_dashboard
    task: gather_dashboard
    partial:
      details: ${{ workflow.workflow_details.return}}
      widgets:
        - ${{ workflow.grouped_ndvi_widget.return }}
        - ${{ workflow.grouped_ndvi_map_widget.return }}
      time_range: ${{ workflow.time_range.return}}
      groupers: ${{ workflow.groupers.return }}

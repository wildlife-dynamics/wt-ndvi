base:
  name: Base Test Case
  mock_io: true
  params:
    workflow_details:
      name: "NDVI Workflow"
      description: "Normalized Difference Vegetation Index Workflow"
    gee_client:
      data_source:
        name: "ecoscope_poc"
    er_client:
      data_source:
        name: "mep_dev"
    time_range:
      since: "2023-01-01T00:00:00Z"
      until: "2023-12-31T23:59:59Z"
    groupers:
      groupers:
        - index_name: "name"
    roi:
      config:
        source: remote_file
        url: "https://www.dropbox.com/s/nvdmidz1o2duyl3/AOIs.gpkg?dl=1"


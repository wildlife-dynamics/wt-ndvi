base:
  name: Base Test Case
  mock_io: true
  params:
    workflow_details:
      name: "NDVI Workflow"
      description: "Normalized Difference Vegetation Index Workflow"
    gee_client:
      data_source:
        name: "ecoscope_poc"
    time_range:
      since: "2023-01-01T00:00:00Z"
      until: "2023-12-31T23:59:59Z"
    groupers:
      groupers:
        - index_name: "name"
    roi:
      config:
        url: "https://www.dropbox.com/s/nvdmidz1o2duyl3/AOIs.gpkg?dl=1"
    ndvi_method:
      var: "MODIS MYD13A1 16-Day Composite"
    calculate_ndvi:
      grouping_unit: month
    base_maps:
      base_maps:
        - url: "https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}"

precomputed:
  name: Precomputed NDVI Test Case
  mock_io: false
  params:
    workflow_details:
      name: "NDVI Workflow"
      description: "Normalized Difference Vegetation Index Workflow"
    gee_client:
      data_source:
        name: "ecoscope_poc"
    time_range:
      since: "2023-01-01T00:00:00Z"
      until: "2023-12-31T23:59:59Z"
    groupers:
      groupers:
        - index_name: "name"
    ndvi_method:
      var: "MODIS MYD13A1 16-Day Composite"
    calculate_ndvi:
      grouping_unit: month
    base_maps:
      base_maps:
        # Note: cannot use layer_name: TERRAIN since layer_name is typed as SkipJsonSchema[str] on TileLayer
        - url: "https://server.arcgisonline.com/ArcGIS/rest/services/World_Topo_Map/MapServer/tile/{z}/{y}/{x}"
    roi:
      config:
        url: "https://www.dropbox.com/s/nvdmidz1o2duyl3/AOIs.gpkg?dl=1"

